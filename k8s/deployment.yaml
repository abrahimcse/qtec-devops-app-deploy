apiVersion: apps/v1
kind: Deployment
metadata:
  name: qtec-devops-task
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qtec-devops-task
  template:
    metadata:
      labels:
        app: qtec-devops-task
    spec:
      containers:
      - name: qtec-devops-task
        image: abrahimcse/qtec-devops-task:ad4906c
        ports:
        - containerPort: 5000
        readinessProbe:
          httpGet:
            path: /status
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /status
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
